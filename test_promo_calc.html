<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>买 N 赠 M 测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test-case { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .pass { background: #d4edda; }
        .fail { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>买 10 赠 1 测试（12L 桶装水，单价 16.8 元）</h1>
    <div id="results"></div>
    
    <script>
        function calculatePromoAmount(quantity, price, threshold, gift) {
            if (!threshold || !gift || quantity < threshold) {
                return {
                    qty: quantity,
                    gift: 0,
                    amount: quantity * price
                };
            }
            
            const cycle = threshold + gift;
            const cycles = Math.floor(quantity / cycle);
            const remainder = quantity % cycle;
            let freeGift = cycles * gift;
            
            if (remainder > threshold) {
                freeGift += Math.min(remainder - threshold, gift);
            }
            
            const paidQty = quantity - freeGift;
            const amount = paidQty * price;
            
            return {
                qty: quantity,
                gift: freeGift,
                amount: amount
            };
        }
        
        const testCases = [
            { qty: 10, expected: 168.00, gift: 0 },
            { qty: 11, expected: 168.00, gift: 1 },
            { qty: 12, expected: 184.80, gift: 1 },
            { qty: 22, expected: 336.00, gift: 2 },
            { qty: 33, expected: 504.00, gift: 3 },
        ];
        
        const resultsDiv = document.getElementById('results');
        let html = '';
        
        testCases.forEach(test => {
            const result = calculatePromoAmount(test.qty, 16.8, 10, 1);
            const pass = Math.abs(result.amount - test.expected) < 0.01 && result.gift === test.gift;
            html += `
                <div class="test-case ${pass ? 'pass' : 'fail'}">
                    <strong>数量 ${test.qty} 桶:</strong><br>
                    付费：${result.qty - result.gift} 桶<br>
                    免费：${result.gift} 桶<br>
                    金额：¥${result.amount.toFixed(2)}<br>
                    期望：¥${test.expected} (免费 ${test.gift} 桶)<br>
                    结果：${pass ? '✅ 通过' : '❌ 失败'}
                </div>
            `;
        });
        
        resultsDiv.innerHTML = html;
    </script>
</body>
</html>
