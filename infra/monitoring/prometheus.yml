# Prometheus configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - alertmanager:9093

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ai-cluster-services"
    metrics_path: /metrics
    static_configs:
      - targets: 
          - "water-service:80"
          - "meeting-service:80" 
          - "unified-service:80"
          - "system-service:80"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:9187"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:9121"]
    metrics_path: /metrics

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
    metrics_path: /metrics