# Nginx生产环境配置 - 新架构统一部署
# 域名：jhw-ai.com
# IP：120.76.156.83
# API端口：8008

# HTTP服务器配置
server {
    listen 80;
    server_name jhw-ai.com www.jhw-ai.com 120.76.156.83;
    
    # 日志配置
    access_log /var/log/nginx/jhw-ai_access.log;
    error_log /var/log/nginx/jhw-ai_error.log;
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    
    # Portal统一入口（首页）
    location /portal/ {
        alias /var/www/jhw-ai/portal/;
        index index.html;
        try_files $uri $uri/ /portal/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 根路径重定向到Portal首页
    location = / {
        return 301 /portal/index.html;
    }
    
    # Space前端
    location /space-frontend/ {
        alias /var/www/jhw-ai/space-frontend/;
        index index.html;
        try_files $uri $uri/ /space-frontend/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Water前端
    location /water/ {
        alias /var/www/jhw-ai/apps/water/frontend/;
        index index.html;
        try_files $uri $uri/ /water/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Meeting前端
    location /meeting-frontend/ {
        alias /var/www/jhw-ai/apps/meeting/frontend/;
        index index.html;
        try_files $uri $uri/ /meeting-frontend/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Shared静态资源
    location /shared/ {
        alias /var/www/jhw-ai/shared/;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API反向代理（统一端口8008）
    location /api/ {
        proxy_pass http://127.0.0.1:8008/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://127.0.0.1:8008/health;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # API文档
    location /docs {
        proxy_pass http://127.0.0.1:8008/docs;
        proxy_set_header Host $host;
    }
    
    location /redoc {
        proxy_pass http://127.0.0.1:8008/redoc;
        proxy_set_header Host $host;
    }
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问敏感目录
    location ~* ^/(data|logs|\.pids|Backup|tests|scripts)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

