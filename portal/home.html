<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI产业集群空间服务管理平台</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .service-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .service-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }
        
        .service-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .service-desc {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .service-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .services-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI产业集群空间服务管理平台</h1>
            <p>一站式企业综合服务管理解决方案</p>
        </div>

                <p class="service-desc">饮用水领用登记、库存管理、结算统计</p>

            </div>
            
            <!-- 会议室预定 -->
            <div class="service-card" onclick="window.location.href='/service/meeting/index.html'">

                <p class="service-desc">会议室在线预约、时段管理、冲突检测</p>
                <div class="service-links">
                    <a href="/service/meeting/index.html" class="btn btn-primary">用户端</a>
                    <a href="/service/meeting/admin.html" class="btn btn-secondary">管理后台</a>

        </div>
        
        <div class="footer">
            <p>© 2026 AI产业集群空间服务管理平台 | 技术支持：首席架构师团队</p>
            <p style="margin-top: 10px;">
                <a href="/portal/admin/water/dashboard.html" style="color: white; text-decoration: underline;">系统管理入口</a>
            </p>
        </div>
    </div>
    
    <script>
        // 环境检测：自动适配本地开发和服务器部署路径
        const isLocalDev = window.location.hostname === 'localhost' && window.location.port === '8080';
        
        // 定义路径映射
        const paths = {
            water: {
                user: isLocalDev ? '/Service_WaterManage/frontend/index.html' : '/service/water/',
                admin: isLocalDev ? '/portal/admin/water/dashboard.html' : '/portal/admin/water/dashboard.html'
            },
            meeting: {
                user: isLocalDev ? '/Service_MeetingRoom/frontend/index.html' : '/service/meeting/',
                admin: isLocalDev ? '/Service_MeetingRoom/frontend/admin.html' : '/service/meeting-admin/admin.html'
            }
        };
        
        // 更新页面中的链接
        function updateLinks() {
            // 水站管理卡片
            const waterCard = document.querySelector('.service-card:nth-child(1)');
            if (waterCard) {
                waterCard.onclick = () => window.location.href = paths.water.user;
            }
            
            // 会议室预定卡片
            const meetingCard = document.querySelector('.service-card:nth-child(2)');
            if (meetingCard) {
                meetingCard.onclick = () => window.location.href = paths.meeting.user;
            }
            
            // 更新所有链接
            document.querySelectorAll('.service-links a').forEach(link => {
                const href = link.getAttribute('href');
                // 精确匹配各个链接，避免模糊匹配导致的问题
                if (href === '/service/water/admin.html' || href.includes('/service/water-admin/') || href.includes('/portal/admin/')) {
                    link.href = paths.water.admin;
                } else if (href === '/service/water/index.html') {
                    link.href = paths.water.user;
                } else if (href === '/service/meeting/admin.html' || href.includes('/service/meeting-admin/')) {
                    link.href = paths.meeting.admin;
                } else if (href === '/service/meeting/index.html') {
                    link.href = paths.meeting.user;
                }
            });
            
            // 更新系统管理入口
            const systemLink = document.querySelector('.footer a');
            if (systemLink && systemLink.getAttribute('href').includes('/service/')) {
                systemLink.href = paths.water.admin;
            }
        }
        
        // 页面加载后更新链接
        updateLinks();
        
        console.log('✅ AI产业集群空间服务管理平台已加载');
        console.log('📍 运行环境:', isLocalDev ? '本地开发 (localhost:8080)' : '服务器部署');
        console.log('📍 当前时间:', new Date().toLocaleString('zh-CN'));
        console.log('📍 链接路径:', paths);
        
        // 检查API服务状态
        const API_BASE = window.location.origin + '/api';
        
        setTimeout(() => {
            fetch(`${API_BASE}/health`)
                .then(res => res.json())
                .then(data => {
                    console.log('✅ 服务状态:', data);
                })
                .catch(err => {
                    console.warn('⚠️ API服务未响应');
                });
        }, 1000);
    </script>
