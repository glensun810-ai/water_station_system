<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间服务管理 - 统一管理后台</title>
    <link rel="stylesheet" href="/portal/assets/css/design-system.css">
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="/portal/assets/js/auth.js"></script></head>
<body>
    <div id="app" v-cloak>
        <nav style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: var(--spacing-lg); position: sticky; top: 0; z-index: 100;">
            <div style="max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
                <div style="display: flex; align-items: center; gap: var(--spacing-lg);">
                    <span style="font-size: 28px;">🏢</span>
                    <div>
                        <h1 style="font-size: var(--font-size-xl); font-weight: 700;">空间服务管理</h1>
                        <p style="font-size: var(--font-size-sm); opacity: 0.9;">统一管理后台</p>
                    </div>
                </div>
                <div style="display: flex; gap: var(--spacing-lg);">
                    <a href="/portal/index.html" style="color: white; text-decoration: none; font-size: var(--font-size-sm);">
                        ← 用户端首页
                    </a>
                    <a href="/portal/admin/index.html" style="color: white; text-decoration: none; font-size: var(--font-size-sm);">
                        系统管理后台
                    </a>
                </div>
            </div>
        </nav>
        
        <main style="max-width: 1400px; margin: var(--spacing-xl) auto; padding: var(--spacing-lg);">
            <section style="margin-bottom: var(--spacing-2xl);">
                <h2 style="font-size: var(--font-size-xl); font-weight: 700; margin-bottom: var(--spacing-lg); color: var(--text-primary);">
                    📊 快捷入口
                </h2>
                
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--spacing-lg);">
                    <a href="/portal/admin/space/approvals.html" class="card" style="text-align: center; padding: var(--spacing-xl); text-decoration: none; transition: all 0.2s;">
                        <div style="font-size: 48px; margin-bottom: var(--spacing-md);">📋</div>
                        <div style="font-size: var(--font-size-lg); font-weight: 600; color: var(--text-primary);">审批中心</div>
                        <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-sm);">审批预约申请</p>
                    </a>
                    
                    <a href="/portal/admin/space/bookings.html" class="card" style="text-align: center; padding: var(--spacing-xl); text-decoration: none; transition: all 0.2s;">
                        <div style="font-size: 48px; margin-bottom: var(--spacing-md);">📅</div>
                        <div style="font-size: var(--font-size-lg); font-weight: 600; color: var(--text-primary);">预约管理</div>
                        <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-sm);">查看所有预约</p>
                    </a>
                    
                    <a href="/portal/admin/space/resources.html" class="card" style="text-align: center; padding: var(--spacing-xl); text-decoration: none; transition: all 0.2s;">
                        <div style="font-size: 48px; margin-bottom: var(--spacing-md);">🏢</div>
                        <div style="font-size: var(--font-size-lg); font-weight: 600; color: var(--text-primary);">资源配置</div>
                        <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-sm);">管理空间资源</p>
                    </a>
                    
                    <a href="/portal/admin/space/statistics.html" class="card" style="text-align: center; padding: var(--spacing-xl); text-decoration: none; transition: all 0.2s;">
                        <div style="font-size: 48px; margin-bottom: var(--spacing-md);">📈</div>
                        <div style="font-size: var(--font-size-lg); font-weight: 600; color: var(--text-primary);">统计分析</div>
                        <p style="font-size: var(--font-size-sm); color: var(--text-secondary); margin-top: var(--spacing-sm);">使用率与收入</p>
                    </a>
                </div>
            </section>
            
            <section style="margin-bottom: var(--spacing-2xl);">
                <h2 style="font-size: var(--font-size-xl); font-weight: 700; margin-bottom: var(--spacing-lg); color: var(--text-primary);">
                    🎯 空间类型
                </h2>
                
                <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--spacing-lg);">
                    <div class="card" style="text-align: center; padding: var(--spacing-lg);">
                        <div style="font-size: 32px;">🏢</div>
                        <div style="font-weight: 600; color: var(--text-primary);">会议室</div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-secondary);">按小时</div>
                    </div>
                    <div class="card" style="text-align: center; padding: var(--spacing-lg);">
                        <div style="font-size: 32px;">🎭</div>
                        <div style="font-weight: 600; color: var(--text-primary);">会场</div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-secondary);">按半天/全天</div>
                    </div>
                    <div class="card" style="text-align: center; padding: var(--spacing-lg);">
                        <div style="font-size: 32px;">📺</div>
                        <div style="font-weight: 600; color: var(--text-primary);">大屏</div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-secondary);">按时段</div>
                    </div>
                    <div class="card" style="text-align: center; padding: var(--spacing-lg);">
                        <div style="font-size: 32px;">🏪</div>
                        <div style="font-weight: 600; color: var(--text-primary);">展位</div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-secondary);">按天/周</div>
                    </div>
                    <div class="card" style="text-align: center; padding: var(--spacing-lg);">
                        <div style="font-size: 32px;">🍽️</div>
                        <div style="font-weight: 600; color: var(--text-primary);">VIP餐厅</div>
                        <div style="font-size: var(--font-size-xs); color: var(--text-secondary);">按餐段</div>
                    </div>
                </div>
            </section>
            
            <section>
                <h2 style="font-size: var(--font-size-xl); font-weight: 700; margin-bottom: var(--spacing-lg); color: var(--text-primary);">
                    🔗 相关管理功能
                </h2>
                
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg);">
                    <a href="/portal/admin/offices.html" class="card" style="text-align: center; padding: var(--spacing-lg); text-decoration: none;">
                        <div style="font-size: 32px;">🏢</div>
                        <div style="font-weight: 600; color: var(--text-primary);">办公室管理</div>
                    </a>
                    <a href="/portal/admin/users.html" class="card" style="text-align: center; padding: var(--spacing-lg); text-decoration: none;">
                        <div style="font-size: 32px;">👥</div>
                        <div style="font-weight: 600; color: var(--text-primary);">用户管理</div>
                    </a>
                    <a href="/portal/admin/settlements.html" class="card" style="text-align: center; padding: var(--spacing-lg); text-decoration: none;">
                        <div style="font-size: 32px;">💰</div>
                        <div style="font-weight: 600; color: var(--text-primary);">结算管理</div>
                    </a>
                </div>
            </section>
        </main>
    </div>
    
    <style>
        [v-cloak] { display: none !important; }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
    </style>
    
    <script>
        const { createApp, onMounted } = Vue
        
        createApp({
            setup() {
                onMounted(async () => {
                    const user = await checkAuth({ requireAuth: true, requireAdmin: true, validateToken: true });
                    if (!user) return;
                    // 加载仪表盘数据
                });
                
                return {};
            }
        }).mount('#app')
    </script>
</body>
</html>
