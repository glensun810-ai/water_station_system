<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1E293B">
    <title>水站工作台 - AI产业集群空间服务</title>
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="../../assets/css/design-system.css">
    <link rel="stylesheet" href="../../components/GlobalHeader.css">
    <script src="../../components/GlobalHeader.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        
        .module-container {
            padding: var(--spacing-xl);
            max-width: 1600px;
            margin: 0 auto;
        }
        
        .module-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-xl);
            flex-wrap: wrap;
            gap: var(--spacing-md);
        }
        
        .module-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .welcome-banner {
            background: linear-gradient(135deg, var(--primary) 0%, #8B5CF6 100%);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            color: white;
            margin-bottom: var(--spacing-xl);
        }
        
        .welcome-title {
            font-size: var(--font-size-xl);
            font-weight: 700;
            margin-bottom: var(--spacing-xs);
        }
        
        .welcome-subtitle {
            font-size: var(--font-size-sm);
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }
        
        .stat-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-base);
            cursor: pointer;
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .stat-info {
            flex: 1;
        }
        
        .stat-value {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .stat-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .stat-change {
            font-size: var(--font-size-xs);
            margin-top: var(--spacing-xs);
        }
        
        .stat-change.up { color: var(--success); }
        .stat-change.down { color: var(--danger); }
        
        .section-title {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }
        
        .quick-action-btn {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .quick-action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }
        
        .quick-action-btn .icon {
            font-size: 20px;
        }
        
        .card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        
        .card-title {
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .usage-stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }
        
        .usage-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            border: 1px solid var(--border);
        }
        
        .usage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-sm);
        }
        
        .usage-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .usage-count {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
        }
        
        .usage-numbers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-sm);
        }
        
        .usage-item {
            text-align: center;
            padding: var(--spacing-sm);
            background: white;
            border-radius: var(--radius-md);
        }
        
        .usage-item-value {
            font-size: var(--font-size-xl);
            font-weight: 700;
        }
        
        .usage-item-label {
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }
        
        .amount-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
        }
        
        .amount-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .amount-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        
        .amount-label {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--spacing-xs);
        }
        
        .amount-value {
            font-size: var(--font-size-2xl);
            font-weight: 700;
        }
        
        .amount-count {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
            margin-top: var(--spacing-xs);
        }
        
        .alert-card {
            background: linear-gradient(135deg, var(--danger-light) 0%, #FECACA 100%);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-lg);
        }
        
        .alert-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }
        
        .alert-title {
            font-weight: 600;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }
        
        .alert-link {
            color: var(--danger);
            font-size: var(--font-size-sm);
            font-weight: 500;
        }
        
        .alert-link:hover {
            text-decoration: underline;
        }
        
        .alert-list {
            display: grid;
            gap: var(--spacing-sm);
        }
        
        .alert-item {
            background: rgba(255,255,255,0.7);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .alert-item-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .alert-item-stock {
            font-weight: 600;
            color: var(--danger);
        }
        
        .ranking-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--spacing-md);
        }
        
        .ranking-item {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .ranking-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--font-size-sm);
            margin-bottom: var(--spacing-sm);
        }
        
        .ranking-badge.gold { background: #FEF3C7; color: #92400E; }
        .ranking-badge.silver { background: var(--bg-primary); color: #475569; }
        .ranking-badge.bronze { background: #FED7AA; color: #C2410C; }
        .ranking-badge.normal { background: var(--bg-secondary); color: var(--text-secondary); }
        
        .ranking-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--font-size-sm);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .ranking-value {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
            margin-top: var(--spacing-xs);
        }
        
        .ranking-unit {
            font-size: var(--font-size-xs);
            color: var(--text-tertiary);
        }
        
        .btn {
            padding: var(--spacing-xs) var(--spacing-md);
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--border);
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .module-container {
                padding: var(--spacing-md);
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--spacing-md);
            }
            
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .usage-stats {
                grid-template-columns: 1fr;
            }
            
            .amount-stats {
                grid-template-columns: 1fr;
            }
            
            .ranking-list {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <global-header :breadcrumbs="[{text: '管理中心', icon: '⚙️', url: '/portal/index.html'}, {text: '水站工作台', icon: '💧', url: '/portal/admin/water/dashboard.html'}]"></global-header>
        <div v-if="loading" class="loading-overlay">
            <div class="loading-spinner"></div>
        </div>
        
        <div v-if="authError" class="module-container" style="text-align: center; padding-top: 100px;">
            <div style="font-size: 64px; margin-bottom: 20px;">🔒</div>
            <h2 style="margin-bottom: 10px;">{{ authError }}</h2>
            <p style="color: var(--text-secondary);">正在跳转登录页面...</p>
        </div>
        
        <template v-else>
            <div class="module-container">
                <div class="welcome-banner">
                    <div class="welcome-title">水站管理工作台</div>
                    <div class="welcome-subtitle">欢迎回来，{{ currentUser?.name || '管理员' }} · {{ currentTime }}</div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card" @click="goTo('settlement')">
                        <div class="stat-icon" style="background: var(--info-light); color: var(--info-dark);">📋</div>
                        <div class="stat-info">
                            <div class="stat-value">{{ pendingTasks.applications_count || 0 }}</div>
                            <div class="stat-label">待确认结算</div>
                            <div class="stat-change" v-if="pendingTasks.pending_office_settlements > 0">
                                含 {{ pendingTasks.pending_office_settlements }} 个办公室
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-card" @click="goTo('products')">
                        <div class="stat-icon" style="background: var(--danger-light); color: var(--danger);">⚠️</div>
                        <div class="stat-info">
                            <div class="stat-value">{{ pendingTasks.low_stock_count || 0 }}</div>
                            <div class="stat-label">库存告警</div>
                            <div class="stat-change" :class="(pendingTasks.low_stock_count || 0) > 0 ? 'down' : 'up'">
                                {{ (pendingTasks.low_stock_count || 0) > 0 ? '产品库存告急' : '库存充足' }}
                            </div>
                        </div>
                    </div>
                    
                    <div class="stat-card" @click="goTo('settlement', 'pending')">
                        <div class="stat-icon" style="background: var(--warning-light); color: var(--warning-dark);">💰</div>
                        <div class="stat-info">
                            <div class="stat-value">{{ quickStats.pending?.unsettled_count || 0 }}</div>
                            <div class="stat-label">待付款</div>
                            <div class="stat-change">笔待收款</div>
                        </div>
                    </div>
                    
                    <div class="stat-card" @click="goTo('pickups')">
                        <div class="stat-icon" style="background: var(--primary-light); color: var(--primary);">🚰</div>
                        <div class="stat-info">
                            <div class="stat-value">{{ totalPickupCount }}</div>
                            <div class="stat-label">领水记录</div>
                            <div class="stat-change">条领取记录</div>
                        </div>
                    </div>
                </div>
                
                <div class="quick-actions">
                    <button class="quick-action-btn" @click="goTo('pickups')">
                        <span class="icon">🚰</span>
                        <span>领水登记</span>
                    </button>
                    <button class="quick-action-btn" @click="goTo('settlement')">
                        <span class="icon">💳</span>
                        <span>结算管理</span>
                    </button>
                    <button class="quick-action-btn" @click="goTo('products')">
                        <span class="icon">📦</span>
                        <span>产品管理</span>
                    </button>
                    <button class="quick-action-btn" @click="goTo('accounts')">
                        <span class="icon">💳</span>
                        <span>预付账户</span>
                    </button>
                </div>
                
                <div v-if="inventoryAlerts && inventoryAlerts.length > 0" class="alert-card">
                    <div class="alert-header">
                        <div class="alert-title">
                            <span>⚠️</span>
                            <span>库存预警</span>
                        </div>
                        <a href="products.html" class="alert-link">去补货 →</a>
                    </div>
                    <div class="alert-list">
                        <div class="alert-item" v-for="alert in inventoryAlerts.slice(0, 5)" :key="alert.id">
                            <span class="alert-item-name">{{ alert.name }}</span>
                            <span class="alert-item-stock">仅剩 {{ alert.stock }} {{ alert.unit }}</span>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>📊</span>
                            <span>用量与库存统计</span>
                        </div>
                        <span class="text-xs text-secondary">本月累计</span>
                    </div>
                    <div class="usage-stats">
                        <div class="usage-card" v-for="unitStat in usageStats.by_unit" :key="unitStat.unit" @click="goTo('pickups')">
                            <div class="usage-header">
                                <span class="usage-name">{{ getUnitDisplayName(unitStat.unit) }}</span>
                                <span class="usage-count">{{ unitStat.transaction_count }} 笔</span>
                            </div>
                            <div class="usage-numbers">
                                <div class="usage-item">
                                    <div class="usage-item-value" style="color: var(--text-primary);">{{ unitStat.quantity }}</div>
                                    <div class="usage-item-label">用量</div>
                                </div>
                                <div class="usage-item">
                                    <div class="usage-item-value" style="color: var(--primary);">{{ unitStat.stock }}</div>
                                    <div class="usage-item-label">库存</div>
                                </div>
                            </div>
                        </div>
                        <div v-if="!usageStats.by_unit || usageStats.by_unit.length === 0" class="empty-state">
                            <p>暂无用量数据</p>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>💵</span>
                            <span>金额统计</span>
                        </div>
                    </div>
                    <div class="amount-stats">
                        <div class="amount-card" @click="goTo('settlement')">
                            <div class="amount-label">已结算金额</div>
                            <div class="amount-value" style="color: var(--success);">¥{{ (metrics?.settled_amount || 0).toFixed(0) }}</div>
                            <div class="amount-count">
                                <span :class="(metrics?.settled_growth_rate || 0) >= 0 ? 'up' : 'down'" style="font-weight: 500;">
                                    {{ (metrics?.settled_growth_rate || 0) >= 0 ? '↑' : '↓' }}{{ Math.abs(metrics?.settled_growth_rate || 0) }}%
                                </span>
                                已收款
                            </div>
                        </div>
                        <div class="amount-card" @click="goTo('settlement', 'pending')">
                            <div class="amount-label">待付款金额</div>
                            <div class="amount-value" style="color: var(--warning);">¥{{ (metrics?.unsettled_amount || 0).toFixed(0) }}</div>
                            <div class="amount-count">{{ quickStats.pending?.unsettled_count || 0 }} 笔待收款</div>
                        </div>
                        <div class="amount-card" @click="goTo('settlement')">
                            <div class="amount-label">付款待确认</div>
                            <div class="amount-value" style="color: var(--info);">¥{{ (metrics?.applied_amount || 0).toFixed(0) }}</div>
                            <div class="amount-count">{{ quickStats.pending?.applied_count || 0 }} 笔待确认</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            <span>🏢</span>
                            <span>办公室用水排行</span>
                        </div>
                        <button class="btn btn-secondary" @click="goTo('pickups')">查看详情 →</button>
                    </div>
                    <div class="ranking-list">
                        <div class="ranking-item" v-for="(dept, index) in officeRanking" :key="dept.office_name">
                            <div class="ranking-badge" :class="getRankingBadgeClass(index)">{{ index + 1 }}</div>
                            <div class="ranking-name">{{ dept.office_name }}</div>
                            <div class="ranking-value">{{ dept.total_qty }}</div>
                            <div class="ranking-unit">桶</div>
                        </div>
                        <div v-if="officeRanking.length === 0" class="empty-state" style="grid-column: 1 / -1;">
                            <p>暂无数据</p>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
    
    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        
        createApp({
            components: { 'global-header': GlobalHeader },
            setup() {
                const protocol = window.location.protocol;
                const hostname = window.location.hostname;
                const port = window.location.port || (protocol === 'https:' ? '443' : '80');
                const API_BASE = `${protocol}//${hostname}:${port}/api`;
                
                const loading = ref(true);
                const authError = ref('');
                const currentUser = ref(null);
                const currentTime = ref('');
                
                const dashboardSummary = ref({});
                const quickStats = ref({});
                const inventoryAlerts = ref([]);
                const officePickups = ref([]);
                
                const updateTime = () => {
                    const now = new Date();
                    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                    currentTime.value = now.toLocaleDateString('zh-CN', options);
                };
                
                const checkAuth = async () => {
                    const storedToken = localStorage.getItem('token');
                    const userInfoStr = localStorage.getItem('userInfo');
                    
                    if (!storedToken || !userInfoStr) {
                        authError.value = '请先登录';
                        loading.value = false;
                        setTimeout(() => { window.location.href = '/portal/admin/login.html'; }, 1500);
                        return false;
                    }
                    
                    currentUser.value = JSON.parse(userInfoStr);
                    
                    if (currentUser.value.role !== 'admin' && currentUser.value.role !== 'super_admin') {
                        authError.value = '您没有权限访问此页面';
                        loading.value = false;
                        setTimeout(() => { window.location.href = '/portal/index.html'; }, 1500);
                        return false;
                    }
                    
                    return true;
                };
                
                const getAuthHeaders = () => {
                    const headers = { 'Content-Type': 'application/json' };
                    const token = localStorage.getItem('token');
                    if (token) headers['Authorization'] = `Bearer ${token}`;
                    return headers;
                };
                
                const loadDashboardData = async () => {
                    try {
                        const headers = getAuthHeaders();
                        
                        const [settlementsRes, productsRes, pickupsRes] = await Promise.all([
                            fetch(`${API_BASE}/settlements/summary`, { headers }),
                            fetch(`${API_BASE}/products`, { headers }),
                            fetch(`${API_BASE}/office-pickups?limit=10000`, { headers })
                        ]);
                        
                        if (settlementsRes.ok) {
                            const summary = await settlementsRes.json();
                            dashboardSummary.value = {
                                metrics: {
                                    settled_amount: summary.water?.settled_amount || 0,
                                    settled_growth_rate: 0,
                                    unsettled_amount: summary.water?.pending_amount || 0,
                                    applied_amount: summary.water?.applied_amount || 0
                                },
                                pending_tasks: {
                                    applications_count: (summary.water?.pending_count || 0) + (summary.water?.applied_count || 0),
                                    pending_office_settlements: summary.water?.pending_count > 0 ? 1 : 0,
                                    low_stock_count: 0
                                },
                                usage_stats: { by_unit: [] }
                            };
                        }
                        
                        if (productsRes.ok) {
                            const products = await productsRes.json();
                            inventoryAlerts.value = products.filter(p => 
                                p.is_active === 1 && p.stock !== null && p.stock <= (p.stock_alert || 10)
                            );
                        }
                        
                        if (pickupsRes.ok) {
                            officePickups.value = await pickupsRes.json();
                        }
                    } catch (e) {
                        console.error('加载工作台数据失败:', e);
                    }
                };
                
                const pendingTasks = computed(() => {
                    return dashboardSummary.value.pending_tasks || {};
                });
                
                const metrics = computed(() => {
                    return dashboardSummary.value.metrics || {};
                });
                
                const usageStats = computed(() => {
                    return dashboardSummary.value.usage_stats || { by_unit: [] };
                });
                
                const totalPickupCount = computed(() => {
                    return officePickups.value.length || 0;
                });
                
                const officeRanking = computed(() => {
                    const pickups = officePickups.value || [];
                    const officeMap = {};
                    
                    pickups.forEach(p => {
                        const name = p.office_name || '未知办公室';
                        if (!officeMap[name]) {
                            officeMap[name] = { office_name: name, total_qty: 0 };
                        }
                        officeMap[name].total_qty += p.quantity || 0;
                    });
                    
                    return Object.values(officeMap)
                        .sort((a, b) => b.total_qty - a.total_qty)
                        .slice(0, 5);
                });
                
                const getUnitDisplayName = (unit) => {
                    const unitMap = {
                        '桶': '🪣 桶装水',
                        '瓶': '🫙 瓶装水',
                        '提': '📦 提装水',
                        '箱': '📦 箱装水',
                        '件': '📦 件装水'
                    };
                    return unitMap[unit] || `${unit}装水`;
                };
                
                const getRankingBadgeClass = (index) => {
                    if (index === 0) return 'gold';
                    if (index === 1) return 'silver';
                    if (index === 2) return 'bronze';
                    return 'normal';
                };
                
                const goTo = (module, subFilter) => {
                    const basePath = window.location.pathname.replace(/[^/]*$/, '');
                    const pageMap = {
                        'dashboard': 'dashboard.html',
                        'pickups': 'pickups.html',
                        'settlement': 'settlement.html',
                        'products': 'products.html',
                        'accounts': 'accounts.html'
                    };
                    
                    if (subFilter) {
                        localStorage.setItem('settlementTab', subFilter);
                    }
                    
                    window.location.href = pageMap[module] || 'dashboard.html';
                };
                
                onMounted(async () => {
                    loading.value = true;
                    updateTime();
                    
                    const authPassed = await checkAuth();
                    
                    if (!authPassed) return;
                    
                    await loadDashboardData();
                    loading.value = false;
                    
                    setInterval(updateTime, 60000);
                });
                
                return {
                    loading,
                    authError,
                    currentUser,
                    currentTime,
                    pendingTasks,
                    metrics,
                    usageStats,
                    quickStats,
                    inventoryAlerts,
                    totalPickupCount,
                    officeRanking,
                    getUnitDisplayName,
                    getRankingBadgeClass,
                    goTo
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
