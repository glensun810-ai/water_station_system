<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563EB">
    <title>管理后台登录 - AI产业集群空间服务</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <style>
        [v-cloak] { display: none !important; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        
        .login-card {
            background: white;
            border-radius: var(--radius-2xl);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-xl);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }
        
        .login-logo {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }
        
        .login-title {
            font-size: var(--font-size-2xl);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
        }
        
        .login-subtitle {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
        }
        
        .form-label {
            font-size: var(--font-size-sm);
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .form-input {
            padding: var(--spacing-md);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            transition: all var(--transition-fast);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            cursor: pointer;
        }
        
        .forgot-link {
            font-size: var(--font-size-sm);
            color: var(--primary);
            text-decoration: none;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .login-btn {
            width: 100%;
            padding: var(--spacing-md);
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-base);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .login-btn:hover {
            background: var(--primary-hover);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .login-footer {
            text-align: center;
            margin-top: var(--spacing-xl);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .back-link {
            color: var(--primary);
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: var(--danger-light);
            color: var(--danger);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            margin-bottom: var(--spacing-lg);
        }
        
        .demo-hint {
            background: var(--info-light);
            color: var(--info-dark);
            padding: var(--spacing-md);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            margin-top: var(--spacing-lg);
        }
        
        .demo-hint-title {
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">🔐</div>
                    <h1 class="login-title">管理后台登录</h1>
                    <p class="login-subtitle">AI产业集群空间服务管理系统</p>
                </div>
                
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
                
                <form @submit.prevent="handleLogin" class="login-form">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input
                            v-model="form.username"
                            type="text"
                            class="form-input"
                            placeholder="请输入用户名"
                            required
                        />
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input
                            v-model="form.password"
                            type="password"
                            class="form-input"
                            placeholder="请输入密码"
                            required
                        />
                    </div>
                    
                    <div class="remember-row">
                        <label class="remember-checkbox">
                            <input v-model="form.remember" type="checkbox" />
                            <span>记住密码</span>
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    
                    <button type="submit" class="login-btn" :disabled="loading">
                        {{ loading ? '登录中...' : '登录' }}
                    </button>
                </form>
                
                <div class="demo-hint">
                    <div class="demo-hint-title">演示账号：</div>
                    <div>用户名：admin</div>
                    <div>密码：admin123</div>
                </div>
                
                <div class="login-footer">
                    <a href="../index.html" class="back-link">← 返回首页</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        const API_BASE = window.location.origin;
        
        createApp({
            setup() {
                const loading = ref(false);
                const errorMessage = ref('');
                
                const form = ref({
                    username: localStorage.getItem('login_username') || '',
                    password: '',
                    remember: localStorage.getItem('login_remember') === 'true'
                });
                
                const handleLogin = async () => {
                    errorMessage.value = '';
                    loading.value = true;
                    
                    try {
                        const response = await fetch(`${API_BASE}/api/admin/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                username: form.value.username,
                                password: form.value.password
                            })
                        });
                        
                        if (!response.ok) {
                            const errorData = await response.json();
                            errorMessage.value = errorData.detail || '登录失败，请重试';
                            loading.value = false;
                            return;
                        }
                        
                        const data = await response.json();
                        
                        const token = data.access_token;
                        const user = data.user_info;
                        
                        localStorage.setItem('token', token);
                        localStorage.setItem('userInfo', JSON.stringify({
                            id: user.user_id,
                            name: user.username,
                            role: user.role_name,
                            roleLabel: getRoleLabel(user.role_name),
                            is_admin: user.role_id === 1 || user.role_name === '超级管理员' || user.role_name === 'admin'
                        }));
                        
                        if (form.value.remember) {
                            localStorage.setItem('login_username', form.value.username);
                            localStorage.setItem('login_remember', 'true');
                        } else {
                            localStorage.removeItem('login_username');
                            localStorage.removeItem('login_remember');
                        }
                        
                        window.location.href = 'index.html';
                        
                    } catch (error) {
                        console.error('Login error:', error);
                        errorMessage.value = '网络错误，请检查连接后重试';
                    } finally {
                        loading.value = false;
                    }
                };
                
                const getRoleLabel = (role) => {
                    const labels = {
                        'super_admin': '超级管理员',
                        'water_admin': '水站管理员',
                        'meeting_admin': '会议室管理员',
                        'finance_admin': '财务管理员'
                    };
                    return labels[role] || '管理员';
                };
                
                return {
                    loading,
                    errorMessage,
                    form,
                    handleLogin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
