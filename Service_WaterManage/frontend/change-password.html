<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - 水站管理后台</title>
    <script src="vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] {
            display: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <div id="app" v-cloak class="w-full max-w-md">
        <!-- 返回按钮和Home按钮 -->
        <div class="mb-4 flex items-center justify-between">
            <a href="admin.html" class="inline-flex items-center text-gray-600 hover:text-gray-900 transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                返回管理后台
            </a>
            <a href="/service/home.html" class="inline-flex items-center bg-gradient-to-r from-blue-500 to-purple-600 text-white px-4 py-2 rounded-lg hover:shadow-lg transition-all duration-200 font-medium text-sm">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
                首页
            </a>
        </div>

        <!-- 修改密码卡片 -->
        <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">修改密码</h1>
                <p class="text-gray-500 text-sm mt-2">请输入您的当前密码和新密码</p>
            </div>

            <!-- 表单 -->
            <form @submit.prevent="changePassword" class="space-y-4">
                <!-- 当前密码 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">当前密码</label>
                    <input 
                        v-model="currentPassword"
                        type="password"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="请输入当前密码"
                    />
                </div>

                <!-- 新密码 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">新密码</label>
                    <input 
                        v-model="newPassword"
                        type="password"
                        required
                        minlength="6"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="请输入新密码（至少6位）"
                    />
                </div>

                <!-- 确认新密码 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">确认新密码</label>
                    <input 
                        v-model="confirmPassword"
                        type="password"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="请再次输入新密码"
                    />
                </div>

                <!-- 错误提示 -->
                <div v-if="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                    {{ errorMessage }}
                </div>

                <!-- 成功提示 -->
                <div v-if="successMessage" class="bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm">
                    {{ successMessage }}
                </div>

                <!-- 提交按钮 -->
                <button 
                    type="submit"
                    :disabled="loading"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <span v-if="!loading">确认修改</span>
                    <span v-else>修改中...</span>
                </button>
            </form>

            <!-- 密码要求提示 -->
            <div class="mt-6 p-4 bg-gray-50 rounded-lg">
                <p class="text-xs text-gray-500 font-medium mb-2">密码要求：</p>
                <ul class="text-xs text-gray-500 space-y-1">
                    <li class="flex items-center">
                        <svg class="w-4 h-4 mr-2 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                        至少6个字符
                    </li>
                    <li class="flex items-center">
                        <svg class="w-4 h-4 mr-2 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                        建议使用字母、数字和符号组合
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const currentPassword = ref('');
                const newPassword = ref('');
                const confirmPassword = ref('');
                const errorMessage = ref('');
                const successMessage = ref('');
                const loading = ref(false);

                const changePassword = async () => {
                    // 清除之前的消息
                    errorMessage.value = '';
                    successMessage.value = '';

                    // 验证
                    if (!currentPassword.value) {
                        errorMessage.value = '请输入当前密码';
                        return;
                    }

                    if (newPassword.value.length < 6) {
                        errorMessage.value = '新密码至少需要6个字符';
                        return;
                    }

                    if (newPassword.value !== confirmPassword.value) {
                        errorMessage.value = '两次输入的新密码不一致';
                        return;
                    }

                    if (currentPassword.value === newPassword.value) {
                        errorMessage.value = '新密码不能与当前密码相同';
                        return;
                    }

                    loading.value = true;

                    try {
                        const userStr = localStorage.getItem('user');
                        if (!userStr) {
                            errorMessage.value = '请先登录';
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 1500);
                            return;
                        }

                        const user = JSON.parse(userStr);
                        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
                        const API_BASE = localStorage.getItem('API_BASE') || (isLocalhost ? 'http://localhost:8000/api' : 'https://jhw-ai.com/api');

                        const response = await fetch(`${API_BASE}/auth/change-password`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            body: JSON.stringify({
                                old_password: currentPassword.value,
                                new_password: newPassword.value
                            })
                        });

                        if (response.ok) {
                            successMessage.value = '密码修改成功！正在跳转到管理后台...';
                            
                            // 清空表单
                            currentPassword.value = '';
                            newPassword.value = '';
                            confirmPassword.value = '';

                            // 3秒后跳转到管理后台
                            setTimeout(() => {
                                window.location.href = 'admin.html';
                            }, 2000);
                        } else {
                            const error = await response.json();
                            errorMessage.value = error.message || '密码修改失败，请检查当前密码是否正确';
                        }
                    } catch (error) {
                        console.error('修改密码失败:', error);
                        errorMessage.value = '密码修改失败，请稍后重试';
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    currentPassword,
                    newPassword,
                    confirmPassword,
                    errorMessage,
                    successMessage,
                    loading,
                    changePassword
                };
            }
        }).mount('#app');
    </script>
    <script>
        // 环境检测：更新返回首页链接
        (function() {
            const isLocalDev = window.location.hostname === 'localhost' && window.location.port === '8080';
            const homeHref = isLocalDev ? '/portal/home.html' : '/service/home.html';
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('a[href="/service/home.html"]').forEach(link => {
                    link.href = homeHref;
                });
            });
        })();
    </script>
</body>
</html>
