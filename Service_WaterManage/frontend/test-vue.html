<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Vue Test</title>
    <script src="vue.global.js?v=20260330"></script>
</head>
<body>
    <div id="app">
        <h1>Vue 测试页面</h1>
        <p>消息：{{ message }}</p>
        <p>计数：{{ count }}</p>
        <button @click="count++">点击 +1</button>
        <button @click="reset">重置</button>
    </div>
    
    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    message: 'Vue 正常工作！',
                    count: 0
                }
            },
            methods: {
                reset() {
                    this.count = 0;
                    alert('已重置');
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
