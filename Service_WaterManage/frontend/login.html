<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水务管理后台 - 登录</title>
    <script src="vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        
        .login-header {
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }
        
        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }
        
        .login-form {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #FEF2F2;
            color: #DC2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
        .footer-text {
            text-align: center;
            padding: 20px 30px;
            background: #F9FAFB;
            color: #6B7280;
            font-size: 13px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <div class="flex items-center justify-center mb-2">
                    <div class="text-5xl">💧</div>
                </div>
                <h1>水务管理后台</h1>
                <p>Enterprise Service Platform</p>
                <a href="/portal/index.html" class="inline-block mt-4 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 shadow-sm hover:shadow-md" style="text-decoration: none; color: white;">
                    <svg class="w-4 h-4 inline-block mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    返回首页
                </a>
            </div>
            
            <form class="login-form" @submit.prevent="handleLogin">
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
                
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        v-model="username"
                        placeholder="请输入用户名"
                        required
                        :disabled="loading"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        v-model="password"
                        placeholder="请输入密码"
                        required
                        :disabled="loading"
                    >
                </div>
                
                <button 
                    type="submit" 
                    class="login-button"
                    :disabled="loading || !username || !password"
                >
                    <span v-if="loading" class="loading-spinner"></span>
                    {{ loading ? '登录中...' : '登 录' }}
                </button>
            </form>
            
            <div class="footer-text">
                © 2026 企业服务管理平台 v2.0
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    errorMessage: ''
                };
            },
            methods: {
                async handleLogin() {
                    if (this.loading) return;
                    
                    this.loading = true;
                    this.errorMessage = '';
                    
                    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
                    const API_BASE = localStorage.getItem('API_BASE') || (isLocalhost ? 'http://localhost:8000/api' : 'https://jhw-ai.com/api');
                    
                    try {
                        const response = await fetch(`${API_BASE}/auth/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: this.username,
                                password: this.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            localStorage.setItem('token', data.access_token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                            
                            window.location.href = '/frontend/admin.html';
                        } else {
                            this.errorMessage = data.detail || data.message || '登录失败，请检查用户名和密码';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        this.errorMessage = '网络错误，请稍后重试';
                    } finally {
                        this.loading = false;
                    }
                }
            },
            mounted() {
                const token = localStorage.getItem('token');
                if (token) {
                    window.location.href = '/frontend/admin.html';
                }
            }
        }).mount('#app');
    </script>
    <script>
        // 环境检测：更新返回首页链接
        (function() {
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('a[href="/service/home.html"]').forEach(link => {
                    link.href = '/portal/index.html';
                });
            });
        })();
    </script>
</body>
</html>
