<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 登录</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border: 1.5px solid #CBD5E1;
            border-radius: 3px;
            background-color: #fff;
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }
        
        input[type="checkbox"]:hover {
            border-color: #94A3B8;
        }
        
        input[type="checkbox"]:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 2px;
            width: 4px;
            height: 7px;
            border: solid white;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }
        
        input[type="checkbox"]:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .logo-icon {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <div class="login-card w-full max-w-md p-8">
            <!-- Logo 和标题 -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mb-4 logo-icon">
                    <span class="text-4xl">💧</span>
                </div>
                <h1 class="text-2xl font-bold text-slate-800 mb-2">水站管理系统</h1>
                <p class="text-slate-500">Water Management System</p>
            </div>

            <!-- 登录表单 -->
            <form @submit.prevent="handleLogin" class="space-y-6">
                <!-- 用户名 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        用户名
                    </label>
                    <input
                        type="text"
                        v-model="loginForm.name"
                        placeholder="请输入用户名"
                        class="input-field w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-blue-500"
                        :class="{'border-red-500': errors.name}"
                        required
                    >
                    <p v-if="errors.name" class="mt-1 text-sm text-red-600">{{ errors.name }}</p>
                </div>

                <!-- 密码 -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        <svg class="inline w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                        </svg>
                        密码
                    </label>
                    <input
                        type="password"
                        v-model="loginForm.password"
                        placeholder="请输入密码"
                        class="input-field w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:border-blue-500"
                        :class="{'border-red-500': errors.password}"
                        required
                    >
                    <p v-if="errors.password" class="mt-1 text-sm text-red-600">{{ errors.password }}</p>
                </div>

                <!-- 记住我 -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" v-model="loginForm.remember">
                        <span class="ml-2 text-sm text-slate-600">记住我</span>
                    </label>
                    <a href="#" class="text-sm text-blue-600 hover:text-blue-800">忘记密码？</a>
                </div>

                <!-- 错误提示 -->
                <div v-if="loginError" class="bg-red-50 border border-red-200 rounded-xl p-4">
                    <div class="flex items-center">
                        <svg class="w-5 h-5 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span class="text-sm text-red-800">{{ loginError }}</span>
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button
                    type="submit"
                    class="btn-primary w-full py-3 text-white font-semibold rounded-xl"
                    :disabled="loading"
                >
                    <span v-if="!loading">登 录</span>
                    <span v-else>
                        <svg class="animate-spin inline w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        登录中...
                    </span>
                </button>
            </form>

            <!-- 初始密码提示 -->
            <div class="mt-6 bg-blue-50 border border-blue-200 rounded-xl p-4">
                <p class="text-xs text-blue-800">
                    <strong>💡 提示：</strong>
                </p>
                <ul class="text-xs text-blue-700 mt-2 space-y-1">
                    <li>• 首次登录请使用系统管理员分配的密码</li>
                    <li>• 初始密码通常为 <code class="bg-blue-100 px-2 py-0.5 rounded">admin123</code></li>
                    <li>• 首次登录后请立即修改密码</li>
                    <li>• 忘记密码请联系系统管理员</li>
                </ul>
            </div>

            <!-- 版权信息 -->
            <p class="mt-8 text-center text-xs text-slate-400">
                © 2025 水站管理系统。All rights reserved.
            </p>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                // 根据当前域名动态判断API地址
                const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                const getApiBase = () => {
                    const stored = localStorage.getItem('API_BASE');
                    if (stored) return stored;
                    return isLocalhost ? 'http://localhost:8000/api' : 'https://jhw-ai.com/api';
                };
                const API_BASE = getApiBase();

                const loginForm = ref({
                    name: '',
                    password: '',
                    remember: false
                });

                const errors = ref({});
                const loginError = ref('');
                const loading = ref(false);

                const validateForm = () => {
                    errors.value = {};
                    
                    if (!loginForm.value.name || !loginForm.value.name.trim()) {
                        errors.value.name = '请输入用户名';
                    }
                    
                    if (!loginForm.value.password) {
                        errors.value.password = '请输入密码';
                    } else if (loginForm.value.password.length < 1) {
                        errors.value.password = '密码长度不能少于 1 位';
                    }
                    
                    return Object.keys(errors.value).length === 0;
                };

                const handleLogin = async () => {
                    if (!validateForm()) return;

                    loading.value = true;
                    loginError.value = '';

                    // 自动检测正确的API地址
                    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
                    const apiBase = localStorage.getItem('API_BASE') || (isLocalhost ? 'http://localhost:8000/api' : 'https://jhw-ai.com/api');

                    try {
                        const response = await fetch(`${apiBase}/auth/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: loginForm.value.name,
                                password: loginForm.value.password
                            })
                        });

                        const data = await response.json();

                        if (response.ok) {
                            // 检查用户角色
                            const userRole = data.user.role;
                            if (userRole !== 'admin' && userRole !== 'super_admin') {
                                loginError.value = '您没有权限访问管理后台，请使用员工账号';
                                loading.value = false;
                                return;
                            }
                            
                            // 存储 Token 和用户信息
                            localStorage.setItem('token', data.access_token);
                            localStorage.setItem('user', JSON.stringify(data.user));
                            
                            if (loginForm.value.remember) {
                                localStorage.setItem('rememberedName', loginForm.value.name);
                            } else {
                                localStorage.removeItem('rememberedName');
                            }

                            // 管理员跳转到管理后台
                            window.location.href = '/water-admin/admin.html';
                        } else {
                            loginError.value = data.detail || '用户名或密码错误';
                        }
                    } catch (error) {
                        console.error('Login error:', error);
                        // 如果是API地址问题，尝试另一个地址
                        if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                            // 尝试备用API地址
                            const altApiBase = isLocalhost ? 'https://jhw-ai.com/api' : 'http://localhost:8000/api';
                            loginError.value = `无法连接到服务器，请检查网络`;
                        } else {
                            loginError.value = '网络错误，请稍后重试';
                        }
                    } finally {
                        loading.value = false;
                    }
                };

                // 页面加载时检查是否有记住的用户名
                const rememberedName = localStorage.getItem('rememberedName');
                if (rememberedName) {
                    loginForm.value.name = rememberedName;
                    loginForm.value.remember = true;
                }
                return {
                    loginForm,
                    errors,
                    loginError,
                    loading,
                    handleLogin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
