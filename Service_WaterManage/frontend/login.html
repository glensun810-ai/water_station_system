<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水务管理后台 - 登录</title>
    <script src="vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            margin: 20px;
        }
        
        .login-header {
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }
        
        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }
        
        .login-form {
            padding: 40px 30px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #FEF2F2;
            color: #DC2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        
.footer-text {
                text-align: center;
                padding: 20px 30px;
                background: #F9FAFB;
                color: #6B7280;
                font-size: 13px;
            }
            
            .loading-spinner {
                display: inline-block;
                width: 16px;
                height: 16px;
                border: 2px solid #ffffff;
                border-top-color: transparent;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-right: 8px;
            }
            
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
            
            /* 办公室选择对话框样式 */
            .office-selection-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 2000;
            }
            
            .office-selection-dialog {
                background: white;
                border-radius: 16px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                width: 90%;
                max-width: 500px;
                max-height: 80vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            
            .dialog-header {
                padding: 24px;
                text-align: center;
                border-bottom: 1px solid #E5E7EB;
            }
            
            .dialog-title {
                font-size: 20px;
                font-weight: 700;
                margin: 0 0 8px 0;
            }
            
            .dialog-subtitle {
                font-size: 14px;
                color: #6B7280;
                margin: 0;
            }
            
            .dialog-body {
                padding: 24px;
                overflow-y: auto;
                max-height: 400px;
            }
            
            .office-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            
            .office-item {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 16px;
                border: 2px solid #E5E7EB;
                border-radius: 12px;
                cursor: pointer;
                transition: all 0.2s;
            }
            
            .office-item:hover {
                border-color: #3B82F6;
                background: #F9FAFB;
            }
            
            .office-item.office-selected {
                border-color: #2563EB;
                background: #EFF6FF;
            }
            
            .office-icon {
                font-size: 32px;
            }
            
            .office-info {
                flex: 1;
            }
            
            .office-name {
                font-weight: 600;
                font-size: 16px;
                margin-bottom: 4px;
            }
            
            .office-location {
                font-size: 13px;
                color: #6B7280;
            }
            
            .office-check {
                width: 24px;
                height: 24px;
                background: #2563EB;
                color: white;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                font-weight: 600;
            }
            
            .dialog-footer {
                padding: 24px;
                border-top: 1px solid #E5E7EB;
            }
            
            .btn {
                padding: 12px 24px;
                border-radius: 8px;
                border: none;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
            }
            
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            
            .btn-primary {
                background: #2563EB;
                color: white;
            }
            
            .btn-primary:hover:not(:disabled) {
                background: #1D4ED8;
            }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-header">
                <div class="flex items-center justify-center mb-2">
                    <div class="text-5xl">💧</div>
                </div>
                <h1>水务管理后台</h1>
                <p>Enterprise Service Platform</p>
                <a href="/portal/index.html" class="inline-block mt-4 bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 shadow-sm hover:shadow-md" style="text-decoration: none; color: white;">
                    <svg class="w-4 h-4 inline-block mr-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    返回首页
                </a>
            </div>
            
            <form class="login-form" @submit.prevent="handleLogin">
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
                
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        v-model="username"
                        placeholder="请输入用户名"
                        required
                        :disabled="loading"
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        v-model="password"
                        placeholder="请输入密码"
                        required
                        :disabled="loading"
                    >
                </div>
                
                <button 
                    type="submit" 
                    class="login-button"
                    :disabled="loading || !username || !password"
                >
                    <span v-if="loading" class="loading-spinner"></span>
                    {{ loading ? '登录中...' : '登 录' }}
                </button>
            </form>
            
            <div class="footer-text">
                © 2026 企业服务管理平台 v2.0
            </div>
        </div>
        
        <!-- 办公室选择对话框 -->
        <div v-if="showOfficeSelection" class="office-selection-overlay">
            <div class="office-selection-dialog">
                <div class="dialog-header">
                    <h3 class="dialog-title">选择您的办公室</h3>
                    <p class="dialog-subtitle">首次登录，请选择您所在的办公室</p>
                </div>
                <div class="dialog-body">
                    <div v-if="loadingOffices" style="text-align: center; padding: 40px;">
                        <div class="loading-spinner"></div>
                        <div style="margin-top: 10px; color: #666;">加载办公室列表...</div>
                    </div>
                    <div v-else class="office-list">
                        <div 
                            v-for="office in offices" 
                            :key="office.id"
                            class="office-item"
                            :class="{ 'office-selected': selectedOfficeId === office.id }"
                            @click="selectedOfficeId = office.id"
                        >
                            <div class="office-icon">🏢</div>
                            <div class="office-info">
                                <div class="office-name">{{ office.name }}</div>
                                <div class="office-location">{{ office.location }}</div>
                            </div>
                            <div v-if="selectedOfficeId === office.id" class="office-check">✓</div>
                        </div>
                    </div>
                </div>
                <div class="dialog-footer">
                    <button 
                        @click="confirmOffice" 
                        class="btn btn-primary"
                        :disabled="!selectedOfficeId"
                        style="width: 100%;"
                    >
                        确认选择
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    username: '',
                    password: '',
                    loading: false,
                    errorMessage: '',
                    showOfficeSelection: false,
                    offices: [],
                    selectedOfficeId: null,
                    loadingOffices: false,
                    tempToken: null,
                    tempUserInfo: null
                };
            },
            methods: {
async handleLogin() {
                    if (this.loading) return;
                    
                    this.loading = true;
                    this.errorMessage = '';
                    
                    const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
                    
                    // 使用动态端口
                    const protocol = window.location.protocol;
                    const hostname = window.location.hostname;
                    const port = window.location.port || (protocol === 'https:' ? '443' : '80');
                    const API_BASE = `${protocol}//${hostname}:${port}/api`;
                    
                    console.log('登录API配置:', { hostname, port, API_BASE });
                    
                    try {
                        const response = await fetch(`${API_BASE}/user/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: this.username,
                                password: this.password
                            })
                        });
                        
                        console.log('API响应状态:', response.status);
                        
                        const data = await response.json();
                        console.log('API响应数据:', data);
                        
                        if (response.ok) {
                            localStorage.setItem('token', data.access_token);
                            
                            // 检查用户是否已设置办公室
                            const storedOffices = localStorage.getItem('user_offices');
                            if (!storedOffices && !data.user_info.department) {
                                // 首次登录，需要选择办公室
                                this.showOfficeSelection = true;
                                this.loadOffices();
                                this.tempToken = data.access_token;
                                this.tempUserInfo = data.user_info;
                            } else {
                                // 已有办公室，直接登录
                                localStorage.setItem('userInfo', JSON.stringify({
                                    id: data.user_info.user_id,
                                    name: data.user_info.username,
                                    role: data.user_info.role_name,
                                    department: data.user_info.department || '',
                                    avatar: '👤',
                                    is_admin: data.user_info.role === 'super_admin' || data.user_info.role === 'admin'
                                }));
                                
                                window.location.href = '/portal/index.html';
                            }
                         } else {
                             this.errorMessage = data.detail || data.message || '登录失败，请检查用户名和密码';
                         }
} catch (error) {
                        console.error('Login error:', error);
                        this.errorMessage = '网络错误，请稍后重试';
                    } finally {
                        this.loading = false;
                    }
                },
                async loadOffices() {
                    this.loadingOffices = true;
                    try {
                        const protocol = window.location.protocol;
                        const hostname = window.location.hostname;
                        const port = window.location.port || (protocol === 'https:' ? '443' : '80');
                        const API_BASE = `${protocol}//${hostname}:${port}/api`;
                        
                        const response = await fetch(`${API_BASE}/offices?is_active=true`);
                        if (response.ok) {
                            this.offices = await response.json();
                        }
                    } catch (error) {
                        console.error('加载办公室失败:', error);
                        this.errorMessage = '加载办公室列表失败，请刷新重试';
                    } finally {
                        this.loadingOffices = false;
                    }
                },
                async confirmOffice() {
                    if (!this.selectedOfficeId) {
                        alert('请选择一个办公室');
                        return;
                    }
                    
                    try {
                        // 保存用户信息和办公室
                        localStorage.setItem('userInfo', JSON.stringify({
                            id: this.tempUserInfo.user_id,
                            name: this.tempUserInfo.username,
                            role: this.tempUserInfo.role_name,
                            department: this.tempUserInfo.department || '',
                            avatar: '👤',
                            is_admin: this.tempUserInfo.role === 'super_admin' || this.tempUserInfo.role === 'admin'
                        }));
                        
                        // 保存用户办公室
                        const selectedOffice = this.offices.find(o => o.id === this.selectedOfficeId);
                        localStorage.setItem('user_offices', JSON.stringify({
                            offices: [selectedOffice],
                            selectedOfficeId: this.selectedOfficeId
                        }));
                        
                        // 跳转到首页
                        window.location.href = '/portal/index.html';
                    } catch (error) {
                        console.error('保存办公室信息失败:', error);
                        alert('保存失败，请重试');
                    }
                },
                mounted() {
                    const token = localStorage.getItem('token');
                    if (token) {
                        window.location.href = '/portal/index.html';
                    }
                }
            }
        }).mount('#app');
    </script>
    <script>
        // 环境检测：更新返回首页链接
        (function() {
            document.addEventListener('DOMContentLoaded', function() {
                document.querySelectorAll('a[href="/portal/index.html"]').forEach(link => {
                    link.href = '/portal/index.html';
                });
            });
        })();
    </script>
</body>
</html>
