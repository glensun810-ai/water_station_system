<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心</title>
    <script src="vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F8FAFC;
        }
        .message-item {
            transition: all 0.2s ease;
        }
        .message-item:hover {
            background-color: #f8fafc;
        }
        .message-unread {
            background-color: #eff6ff;
        }
        .message-unread:hover {
            background-color: #dbeafe;
        }
    </style>
</head>
<body>
    <div id="app" class="min-h-screen">
        <!-- 顶部导航 -->
        <header class="bg-white shadow-sm px-4 py-3 sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <button @click="goBack" class="text-slate-600 hover:text-slate-800">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </button>
                    <div>
                        <h1 class="text-lg font-bold text-slate-800">📬 消息中心</h1>
                        <p class="text-xs text-slate-500">{{ unreadCount }} 条未读消息</p>
                    </div>
                </div>
                <button v-if="unreadCount > 0" @click="markAllAsRead" 
                    class="text-xs text-blue-600 hover:text-blue-700 font-medium">
                    全部已读
                </button>
            </div>
        </header>

        <!-- 消息列表 -->
        <div class="p-4">
            <!-- 消息类型筛选 -->
            <div class="flex gap-2 mb-4 overflow-x-auto">
                <button @click="filterType = 'all'" 
                    :class="['text-xs px-3 py-1.5 rounded-lg whitespace-nowrap', 
                        filterType === 'all' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600']">
                    全部
                </button>
                <button @click="filterType = 'unread'" 
                    :class="['text-xs px-3 py-1.5 rounded-lg whitespace-nowrap', 
                        filterType === 'unread' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600']">
                    未读
                </button>
                <button @click="filterType = 'settlement'" 
                    :class="['text-xs px-3 py-1.5 rounded-lg whitespace-nowrap', 
                        filterType === 'settlement' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600']">
                    💰 结算
                </button>
                <button @click="filterType = 'warning'" 
                    :class="['text-xs px-3 py-1.5 rounded-lg whitespace-nowrap', 
                        filterType === 'warning' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600']">
                    ⚠️ 预警
                </button>
                <button @click="filterType = 'info'" 
                    :class="['text-xs px-3 py-1.5 rounded-lg whitespace-nowrap', 
                        filterType === 'info' ? 'bg-blue-600 text-white' : 'bg-white text-slate-600']">
                    ℹ️ 通知
                </button>
            </div>

            <!-- 消息列表 -->
            <div v-if="filteredMessages.length === 0" class="text-center text-slate-400 py-12">
                <svg class="w-16 h-16 mx-auto mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
                </svg>
                <p>暂无消息</p>
            </div>

            <div v-else class="space-y-2">
                <div v-for="msg in filteredMessages" :key="msg.id"
                    @click="markAsRead(msg.id)"
                    :class="['message-item rounded-xl p-4 cursor-pointer', 
                        msg.is_read === 0 ? 'message-unread border-l-4 border-blue-500' : 'bg-white']">
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-lg">{{ getMessageIcon(msg.type) }}</span>
                                <h3 class="font-bold text-slate-800 text-sm truncate">{{ msg.title }}</h3>
                                <span v-if="msg.is_read === 0" class="w-2 h-2 bg-blue-500 rounded-full flex-shrink-0"></span>
                            </div>
                            <p class="text-sm text-slate-600 line-clamp-2">{{ msg.content }}</p>
                            <p class="text-xs text-slate-400 mt-2">{{ formatTime(msg.created_at) }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 消息提示 -->
        <div v-if="toast.show" :class="['fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-lg text-white font-medium',
            toast.type === 'success' ? 'bg-green-600' : 'bg-slate-700']">
            {{ toast.message }}
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        const API_BASE = 'http://localhost:8000';

        createApp({
            data() {
                return {
                    messages: [],
                    unreadCount: 0,
                    filterType: 'all',
                    user: null,
                    toast: { show: false, message: '', type: 'success' }
                };
            },
            computed: {
                filteredMessages() {
                    let filtered = this.messages;
                    if (this.filterType === 'unread') {
                        return filtered.filter(m => m.is_read === 0);
                    }
                    if (this.filterType !== 'all') {
                        filtered = filtered.filter(m => m.type === this.filterType);
                    }
                    return filtered;
                }
            },
            methods: {
                async loadMessages() {
                    try {
                        const storedToken = localStorage.getItem('token');
                        const headers = {
                            'Authorization': `Bearer ${storedToken}`
                        };

                        // 获取未读数量
                        const countRes = await fetch(`${API_BASE}/api/notifications/unread-count?user_id=${this.user.id}`, { headers });
                        const countData = await countRes.json();
                        this.unreadCount = countData.unread_count;

                        // 获取消息列表
                        const res = await fetch(`${API_BASE}/api/notifications?user_id=${this.user.id}&limit=100`, { headers });
                        this.messages = await res.json();
                    } catch (error) {
                        console.error('加载消息失败:', error);
                    }
                },
                async markAsRead(messageId) {
                    try {
                        const storedToken = localStorage.getItem('token');
                        await fetch(`${API_BASE}/api/notifications/${messageId}/read`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${storedToken}`
                            }
                        });
                        this.loadMessages();
                    } catch (error) {
                        console.error('标记已读失败:', error);
                    }
                },
                async markAllAsRead() {
                    try {
                        const storedToken = localStorage.getItem('token');
                        await fetch(`${API_BASE}/api/notifications/mark-all-read`, {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${storedToken}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ user_id: this.user.id })
                        });
                        this.showToast('已全部标记为已读', 'success');
                        this.loadMessages();
                    } catch (error) {
                        console.error('全部标记失败:', error);
                    }
                },
                getMessageIcon(type) {
                    const icons = {
                        'settlement': '💰',
                        'warning': '⚠️',
                        'info': 'ℹ️',
                        'reminder': '🔔'
                    };
                    return icons[type] || '📬';
                },
                formatTime(dateStr) {
                    const date = new Date(dateStr);
                    const now = new Date();
                    const diff = now - date;
                    const minutes = Math.floor(diff / 60000);
                    const hours = Math.floor(diff / 3600000);
                    const days = Math.floor(diff / 86400000);

                    if (minutes < 1) return '刚刚';
                    if (minutes < 60) return `${minutes}分钟前`;
                    if (hours < 24) return `${hours}小时前`;
                    if (days < 7) return `${days}天前`;
                    
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    return `${month}/${day}`;
                },
                goBack() {
                    window.history.back();
                },
                showToast(message, type = 'success') {
                    this.toast = { show: true, message, type };
                    setTimeout(() => {
                        this.toast.show = false;
                    }, 2000);
                }
            },
            mounted() {
                const userData = localStorage.getItem('user');
                if (userData) {
                    this.user = JSON.parse(userData);
                } else {
                    window.location.href = 'login.html';
                    return;
                }
                this.loadMessages();
                
                // 每 30 秒刷新一次未读数量
                setInterval(() => {
                    this.loadMessages();
                }, 30000);
            }
        }).mount('#app');
    </script>
</body>
</html>
