<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存过滤测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>库存过滤测试</h1>
        
        <h2>所有产品 (products):</h2>
        <ul>
            <li v-for="p in products" :key="p.id">
                {{ p.name }} ({{ p.specification }}): 库存 = {{ p.stock }}
            </li>
        </ul>
        
        <h2>有库存的产品 (inStockProducts):</h2>
        <ul>
            <li v-for="p in inStockProducts" :key="p.id">
                {{ p.name }} ({{ p.specification }}): 库存 = {{ p.stock }}
            </li>
        </ul>
        
        <p v-if="inStockProducts.length === 0" style="color: gray;">
            暂时缺货，敬请期待
        </p>
        
        <h2>测试结果:</h2>
        <p>产品总数：{{ products.length }}</p>
        <p>有库存数量：{{ inStockProducts.length }}</p>
        <p v-if="inStockProducts.length === products.length" style="color: green;">✓ 所有产品都有库存</p>
        <p v-else-if="inStockProducts.length > 0" style="color: orange;">✓ 部分产品有库存</p>
        <p v-else style="color: red;">✓ 所有产品都缺货</p>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const API_BASE = 'http://localhost:8000/api';
                const products = ref([]);

                const inStockProducts = computed(() =>
                    products.value.filter(p => p.stock > 0)
                );

                const loadData = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/products`);
                        products.value = await res.json();
                        console.log('Products loaded:', products.value);
                        console.log('In stock products:', inStockProducts.value);
                    } catch (e) {
                        console.error('Failed to load:', e);
                    }
                };

                onMounted(() => {
                    loadData();
                });

                return {
                    products,
                    inStockProducts
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
