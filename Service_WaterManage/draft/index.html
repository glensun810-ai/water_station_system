<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能水站</title>
    <script src="../frontend/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #F8FAFC;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e5e5;
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .card-shadow {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .btn-press:active {
            transform: scale(0.98);
        }
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Loading 页面 -->
    <div id="loading">
        <div style="text-align: center;">
            <div class="spinner" style="margin: 0 auto 16px;"></div>
            <p style="color: #666; font-size: 14px;">加载中...</p>
        </div>
    </div>

    <!-- Vue 应用 -->
    <div id="app" style="display: none;" class="overflow-x-hidden">
        <header class="bg-gradient-to-r from-blue-600 to-blue-500 px-4 py-6 sticky top-0 z-10">
            <div class="flex justify-between items-center">
                <div class="min-w-0 flex-1">
                    <p class="text-white text-sm opacity-90 mb-1">欢迎使用</p>
                    <h1 class="text-white text-xl font-bold truncate">智能水站</h1>
                    <p class="text-white text-xs opacity-80 mt-1">领水登记 · 待结算 · 我的记录</p>
                </div>
            </div>
        </header>

        <div class="px-4 pb-10" v-if="appLoaded">
            <!-- 快捷入口 -->
            <div class="mt-4 grid grid-cols-1 gap-3">
                <a href="pickup-unified.html" class="bg-white rounded-2xl p-4 card-shadow btn-press border-2 border-slate-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-base font-bold text-slate-800">💧 领水登记</p>
                            <p class="text-xs text-slate-500 mt-1">选择规格 → 输入数量 → 确认</p>
                        </div>
                        <span class="text-slate-400">›</span>
                    </div>
                </a>
                <a href="pending-settlement.html" class="bg-white rounded-2xl p-4 card-shadow btn-press border-2 border-slate-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-base font-bold text-slate-800">💰 待结算</p>
                            <p class="text-xs text-slate-500 mt-1">预付优先抵扣，剩余挂账</p>
                        </div>
                        <span class="text-slate-400">›</span>
                    </div>
                </a>
                <a href="my-records.html" class="bg-white rounded-2xl p-4 card-shadow btn-press border-2 border-slate-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-base font-bold text-slate-800">📋 我的记录</p>
                            <p class="text-xs text-slate-500 mt-1">领水/结算历史</p>
                        </div>
                        <span class="text-slate-400">›</span>
                    </div>
                </a>
                <a href="../frontend/user-balance.html" class="bg-white rounded-2xl p-4 card-shadow btn-press border-2 border-slate-50">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-base font-bold text-slate-800">💳 预付管理</p>
                            <p class="text-xs text-slate-500 mt-1">余额查询 / 充值入口</p>
                        </div>
                        <span class="text-slate-400">›</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- 消息提示 -->
        <div v-if="toast.show" class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-lg text-white font-medium"
             :style="toast.type === 'success' ? 'background:#22c55e' : toast.type === 'error' ? 'background:#ef4444' : 'background:#64748b'">
            {{ toast.message }}
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        const API_BASE = localStorage.getItem('API_BASE') || 'http://localhost:8000';

        createApp({
            data() {
                return {
                    appLoaded: false,
                    toast: { show: false, message: '', type: 'success' }
                };
            },
            methods: {
                showToast(message, type = 'success') {
                    this.toast = { show: true, message, type };
                    setTimeout(() => (this.toast.show = false), 2000);
                },
                async loadData() {
                    try {
                        // 无需登录，直接显示页面
                        this.appLoaded = true;
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('app').style.display = 'block';
                    } catch (error) {
                        console.error('加载失败:', error);
                        document.getElementById('loading').innerHTML = '<div style="text-align:center;padding:40px;"><p style="color:#666;font-size:14px;">加载失败，请检查网络或后端服务</p><button onclick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#2563EB;color:white;border-radius:8px;border:none;">重试</button></div>';
                    }
                }
            },
            mounted() {
                this.loadData();
            }
        }).mount('#app');
    </script>
</body>
</html>
