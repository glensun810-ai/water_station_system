<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试 Vue</title>
    <script src="../frontend/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>{{ message }}</h1>
        <p>Vue 版本：{{ vueVersion }}</p>
        <p v-if="loaded">✓ Vue 正常工作</p>
        <p v-else>✗ Vue 未加载</p>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const message = ref('Hello Vue!');
                const vueVersion = ref(Vue.version || '未知');
                const loaded = ref(true);
                
                return {
                    message,
                    vueVersion,
                    loaded
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
