<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能水站 - 修复版</title>
    <script src="../frontend/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: #F8FAFC; 
        }
        /* 只显示 loading，Vue 挂载后隐藏 */
        #loading { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #e5e5e5; 
            border-top-color: #2563EB; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Loading 页面 -->
    <div id="loading">
        <div style="text-align: center;">
            <div class="spinner" style="margin: 0 auto 16px;"></div>
            <p style="color: #666; font-size: 14px;">加载中...</p>
        </div>
    </div>

    <!-- Vue 应用 -->
    <div id="app" style="display: none;">
        <header class="bg-white shadow-sm px-4 py-4">
            <h1 class="text-lg font-bold text-slate-800">🚰 智能水站</h1>
        </header>

        <div class="p-4" v-if="appLoaded">
            <div class="bg-gradient-to-r from-blue-600 to-blue-500 rounded-2xl p-4 text-white shadow-lg mb-4">
                <div class="grid grid-cols-3 gap-3 text-center">
                    <div>
                        <p class="text-xs opacity-80">本月已领</p>
                        <p class="text-xl font-bold">{{ userStatus.month_total_qty || 0 }}</p>
                    </div>
                    <div>
                        <p class="text-xs opacity-80">待结算</p>
                        <p class="text-xl font-bold">¥{{ (userStatus.to_apply_amount || 0).toFixed(2) }}</p>
                    </div>
                    <div>
                        <p class="text-xs opacity-80">已结算</p>
                        <p class="text-xl font-bold">¥{{ (userStatus.settled_amount || 0).toFixed(2) }}</p>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">选择领取规格</h2>
                
                <div v-if="inStockProducts.length === 0" class="text-center text-slate-400 py-8">
                    暂时缺货，敬请期待
                </div>

                <div 
                    v-for="product in inStockProducts" 
                    :key="product.id"
                    @click="selectedProduct = product"
                    :class="['rounded-2xl border-2 p-4 cursor-pointer transition',
                             selectedProduct?.id === product.id ? 'border-blue-500 bg-blue-50' : 'border-slate-100 bg-white']"
                >
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-slate-800">{{ product.name }}</h3>
                            <p class="text-sm text-slate-500">{{ product.specification }}</p>
                        </div>
                        <p class="text-blue-600 font-bold">¥{{ product.price }}</p>
                    </div>
                </div>
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t">
                <button 
                    @click="submitPickup" 
                    :disabled="!selectedProduct"
                    class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold disabled:bg-gray-300"
                >
                    确认领取
                </button>
            </div>
        </div>

        <!-- Success Modal -->
        <div v-if="showSuccess" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4" @click="showSuccess = false">
            <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center" @click.stop>
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">✓</span>
                </div>
                <h3 class="text-xl font-bold mb-2">领取成功！</h3>
                <button @click="showSuccess = false; refreshAll()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">
                    确定
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        console.log('Vue 版本:', Vue.version);

        createApp({
            setup() {
                const API_BASE = 'http://localhost:8000/api';
                const products = ref([]);
                const currentUser = ref({ id: 1, name: '张三', department: '研发部' });
                const selectedProduct = ref(null);
                const loading = ref(false);
                const showSuccess = ref(false);
                const appLoaded = ref(false);

                const userStatus = ref({
                    month_total_qty: 0,
                    to_apply_amount: 0,
                    settled_amount: 0
                });

                // 安全访问 userStatus 的方法
                const getStatusValue = (key, defaultVal = 0) => {
                    return userStatus.value && userStatus.value[key] !== undefined 
                        ? userStatus.value[key] 
                        : defaultVal;
                };

                const inStockProducts = computed(() => {
                    if (!products.value || !Array.isArray(products.value)) return [];
                    return products.value.filter(p => p.stock > 0);
                });

                console.log('初始化...');

                const loadData = async () => {
                    console.log('加载产品列表...');
                    try {
                        const res = await fetch(API_BASE + '/products');
                        console.log('产品响应状态:', res.status);
                        products.value = await res.json();
                        console.log('产品数量:', products.value.length);
                        
                        const firstInStock = products.value.find(p => p.stock > 0);
                        if (firstInStock) {
                            selectedProduct.value = firstInStock;
                            console.log('选择产品:', firstInStock.name);
                        }
                    } catch (e) {
                        console.error('加载失败:', e);
                        alert('加载数据失败：' + e.message);
                    }
                };

                const refreshUserStatus = async () => {
                    console.log('加载用户状态...');
                    try {
                        const res = await fetch(API_BASE + '/user/' + currentUser.value.id + '/status');
                        console.log('状态响应状态:', res.status);
                        userStatus.value = await res.json();
                        console.log('用户状态:', userStatus.value);
                    } catch (e) {
                        console.error('获取状态失败:', e);
                    }
                };

                const refreshAll = () => {
                    loadData();
                    refreshUserStatus();
                };

                const submitPickup = async () => {
                    if (!selectedProduct.value) {
                        alert('请选择产品');
                        return;
                    }
                    loading.value = true;
                    try {
                        const res = await fetch(API_BASE + '/record', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                user_id: currentUser.value.id,
                                product_id: selectedProduct.value.id,
                                quantity: 1,
                                type: 'pickup'
                            })
                        });
                        if (!res.ok) throw new Error('提交失败');
                        const result = await res.json();
                        console.log('领取结果:', result);
                        showSuccess.value = true;
                        refreshAll();
                    } catch (e) {
                        alert('领取失败：' + e.message);
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    console.log('Vue 应用已挂载');
                    
                    // 隐藏 loading，显示 app
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    appLoaded.value = true;
                    
                    console.log('开始加载数据...');
                    loadData();
                    refreshUserStatus();
                });

                return {
                    products,
                    currentUser,
                    selectedProduct,
                    loading,
                    showSuccess,
                    userStatus,
                    inStockProducts,
                    appLoaded,
                    submitPickup,
                    refreshAll
                };
            }
        }).mount('#app');

        console.log('脚本执行完毕');
    </script>
</body>
</html>
