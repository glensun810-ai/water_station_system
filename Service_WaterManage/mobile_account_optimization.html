<!-- 优化后的移动端账户卡片设计 -->
<!-- 设计理念：紧凑、清晰、高效 -->

<div v-if="filteredOfficeAccounts && filteredOfficeAccounts.length > 0" class="sm:hidden space-y-2">
    <div v-for="acc in filteredOfficeAccounts" :key="acc.id" 
         class="bg-white rounded-xl border p-3 shadow-sm hover:shadow-md transition-all active:scale-[0.98]"
         :class="acc.status === 'normal' ? 'border-green-200' : (acc.status === 'low' ? 'border-amber-300' : 'border-red-300')">
        
        <!-- 第一行：办公室 + 状态 -->
        <div class="flex items-center justify-between mb-2">
            <div class="flex-1 min-w-0">
                <div class="font-bold text-slate-800 text-sm truncate">{{ acc.office_name }}</div>
                <div class="text-xs text-slate-500 truncate">{{ acc.office_room_number || '-' }}</div>
            </div>
            <span :class="statusBadgeClass(acc.status)" class="ml-2 px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-1 shrink-0">
                <span :class="statusIndicatorClass(acc.status)"></span>
                {{ statusText(acc.status) }}
            </span>
        </div>
        
        <!-- 第二行：产品规格 -->
        <div class="text-xs text-slate-600 mb-2 truncate">
            <span class="font-medium">{{ acc.product_name }}</span>
            <span class="text-slate-400 ml-1">{{ acc.product_specification }}</span>
        </div>
        
        <!-- 第三行：核心数据（紧凑布局） -->
        <div class="grid grid-cols-3 gap-2 mb-2">
            <div class="bg-slate-50 rounded-lg p-2 text-center">
                <div class="text-xs text-slate-500">预留</div>
                <div class="text-base font-bold text-slate-700">{{ acc.reserved_qty }}</div>
            </div>
            <div class="rounded-lg p-2 text-center" :class="remainingBgClass(acc.status)">
                <div class="text-xs" :class="remainingTextClass(acc.status)">剩余</div>
                <div class="text-xl font-bold" :class="remainingTextClass(acc.status)">{{ acc.remaining_qty }}</div>
            </div>
            <div class="bg-slate-50 rounded-lg p-2 text-center">
                <div class="text-xs text-slate-500">已用</div>
                <div class="text-base font-bold text-slate-700">{{ acc.used_qty }}</div>
            </div>
        </div>
        
        <!-- 第四行：用量进度条（视觉化） -->
        <div class="mb-2">
            <div class="flex justify-between text-xs mb-1">
                <span class="text-slate-500">使用率</span>
                <span class="font-medium" :class="usageRateClass(acc)">{{ usageRate(acc) }}%</span>
            </div>
            <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all" :class="usageBarClass(acc)" :style="{ width: usageRate(acc) + '%' }"></div>
            </div>
        </div>
        
        <!-- 第五行：负责人 + 操作 -->
        <div class="flex items-center justify-between pt-2 border-t border-slate-100">
            <div class="text-xs text-slate-600 flex items-center gap-1">
                <i class="fas fa-user text-slate-400"></i>
                <span>{{ acc.reserved_person || '-' }}</span>
            </div>
            <div class="flex items-center gap-1">
                <button @click="rechargeOfficeAccount(acc)" class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-200 active:bg-blue-300 transition">
                    <i class="fas fa-plus text-xs"></i>
                </button>
                <button @click="openOfficeAccountModal(acc)" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 flex items-center justify-center hover:bg-slate-200 active:bg-slate-300 transition">
                    <i class="fas fa-edit text-xs"></i>
                </button>
                <button @click="deleteOfficeAccount(acc)" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-200 active:bg-red-300 transition">
                    <i class="fas fa-trash text-xs"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript 辅助函数 -->
<script>
const statusBadgeClass = (status) => {
    const classes = {
        normal: 'bg-green-100 text-green-700',
        low: 'bg-amber-100 text-amber-700',
        empty: 'bg-red-100 text-red-700'
    };
    return classes[status] || classes.normal;
};

const statusIndicatorClass = (status) => {
    const classes = {
        normal: 'w-2 h-2 rounded-full bg-green-500',
        low: 'w-2 h-2 rounded-full bg-amber-500 animate-pulse',
        empty: 'w-2 h-2 rounded-full bg-red-500'
    };
    return classes[status] || classes.normal;
};

const statusText = (status) => {
    const texts = {
        normal: '正常',
        low: '不足',
        empty: '用完'
    };
    return texts[status] || '正常';
};

const remainingBgClass = (status) => {
    const classes = {
        normal: 'bg-green-50',
        low: 'bg-amber-50',
        empty: 'bg-red-50'
    };
    return classes[status] || classes.normal;
};

const remainingTextClass = (status) => {
    const classes = {
        normal: 'text-green-600',
        low: 'text-amber-600',
        empty: 'text-red-600'
    };
    return classes[status] || classes.normal;
};

const usageRate = (acc) => {
    if (!acc.reserved_qty || acc.reserved_qty === 0) return 0;
    return Math.round((acc.used_qty / acc.reserved_qty) * 100);
};

const usageRateClass = (acc) => {
    const rate = usageRate(acc);
    if (rate >= 80) return 'text-red-600 font-bold';
    if (rate >= 50) return 'text-amber-600 font-medium';
    return 'text-green-600 font-medium';
};

const usageBarClass = (acc) => {
    const rate = usageRate(acc);
    if (rate >= 80) return 'bg-red-500';
    if (rate >= 50) return 'bg-amber-500';
    return 'bg-green-500';
};
</script>
