<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>登录 - AI产业集群</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.tailwindcss.com">
    <style>
        [v-cloak] { display: none !important; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            padding-top: 10vh;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            font-size: 32px;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            color: #1e293b;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #64748b;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 16px;
            font-size: 14px;
        }
        
        .link {
            color: #64748b;
            text-decoration: none;
        }
        
        .link:hover {
            color: #3b82f6;
        }
        
        .divider {
            border-top: 1px solid #e2e8f0;
            margin: 24px 0;
            position: relative;
        }
        
        .divider-text {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 0 16px;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .social-login {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .social-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
                padding-top: 5vh;
            }
            
            .login-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="login-container">
            <div class="login-card">
                <div class="logo">🏢</div>
                <h1 class="title">空间服务预约系统</h1>
                
                <div v-if="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>
                
                <div v-if="successMessage" class="success-message">
                    {{ successMessage }}
                </div>
                
                <form @submit.prevent="handleLogin">
                    <div class="form-group">
                        <label class="form-label">用户名 / 手机号</label>
                        <input 
                            type="text" 
                            class="form-input"
                            v-model="username"
                            placeholder="请输入用户名或手机号"
                            required
                            :disabled="loading"
                        >
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <div class="password-wrapper">
                            <input 
                                :type="showPassword ? 'text' : 'password'"
                                class="form-input"
                                v-model="password"
                                placeholder="请输入密码"
                                required
                                :disabled="loading"
                            >
                            <span class="password-toggle" @click="showPassword = !showPassword">
                                {{ showPassword ? '👁️' : '👁️‍🗨️' }}
                            </span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" v-model="rememberMe">
                            <span>记住我</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="login-btn" :disabled="loading">
                        <span v-if="loading" class="loading-spinner"></span>
                        {{ loading ? '登录中...' : '登录' }}
                    </button>
                </form>
                
                <div class="links">
                    <a href="#" class="link" @click.prevent="forgotPassword">忘记密码？</a>
                    <a href="register.html" class="link">注册账号</a>
                </div>
                
                <div class="divider">
                    <span class="divider-text">其他登录方式</span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn" @click="socialLogin('wechat')">
                        💬 微信
                    </button>
                    <button class="social-btn" @click="socialLogin('dingtalk')">
                        📱 钉钉
                    </button>
                    <button class="social-btn" @click="socialLogin('work_wechat')">
                        🏢 企业微信
                    </button>
                </div>
                
                <div style="margin-top: 24px; font-size: 12px; color: #94a3b8; text-align: center;">
                    测试账号: admin / 123456
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const protocol = window.location.protocol;
                const hostname = window.location.hostname;
                const port = window.location.port || '8008';
                const API_BASE = `${protocol}//${hostname}:${port}/api/v1/system`;
                
                const username = ref('');
                const password = ref('');
                const showPassword = ref(false);
                const rememberMe = ref(false);
                const loading = ref(false);
                const errorMessage = ref('');
                const successMessage = ref('');
                
                const handleLogin = async () => {
                    errorMessage.value = '';
                    successMessage.value = '';
                    
                    if (!username.value || !password.value) {
                        errorMessage.value = '请输入用户名和密码';
                        return;
                    }
                    
                    loading.value = true;
                    
                    try {
                        const response = await fetch(`${API_BASE}/auth/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                username: username.value,
                                password: password.value,
                            }),
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            localStorage.setItem('token', data.token || data.access_token);
                            localStorage.setItem('token_timestamp', new Date().toISOString());
                            localStorage.setItem('userInfo', JSON.stringify(data.user || data));
                            
                            if (rememberMe.value) {
                                localStorage.setItem('rememberedUsername', username.value);
                            } else {
                                localStorage.removeItem('rememberedUsername');
                            }
                            
                            successMessage.value = '登录成功，正在跳转...';
                            
                            setTimeout(() => {
                                const user = data.user || data;
                                if (user.role === 'admin' || user.role === 'super_admin' || user.role === 'office_admin') {
                                    window.location.href = '/portal/index.html#system-management-section';
                                } else {
                                    window.location.href = '/space-frontend/index.html';
                                }
                            }, 1000);
                        } else {
                            errorMessage.value = data.detail || data.message || '登录失败，请检查用户名和密码';
                        }
                    } catch (error) {
                        errorMessage.value = '网络错误，请稍后重试';
                        console.error('登录失败:', error);
                    } finally {
                        loading.value = false;
                    }
                };
                
                const forgotPassword = () => {
                    alert('请联系管理员重置密码');
                };
                
                const socialLogin = (provider) => {
                    alert(`${provider}登录功能即将上线`);
                };
                
                const rememberedUsername = localStorage.getItem('rememberedUsername');
                if (rememberedUsername) {
                    username.value = rememberedUsername;
                    rememberMe.value = true;
                }
                
                return {
                    username,
                    password,
                    showPassword,
                    rememberMe,
                    loading,
                    errorMessage,
                    successMessage,
                    handleLogin,
                    forgotPassword,
                    socialLogin,
                };
            },
        }).mount('#app');
    </script>
</body>
</html>
