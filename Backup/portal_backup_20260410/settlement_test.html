<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算管理 - 功能测试</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>🧪 结算管理功能测试</h1>
        <p>测试Vue应用是否正常加载</p>
        <div v-if="loading">加载中...</div>
        <div v-else>
            <p>✅ Vue应用正常加载!</p>
            <p>状态: {{ message }}</p>
            <p>错误: {{ error }}</p>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const loading = ref(true);
                const message = ref('');
                const error = ref('');

                onMounted(() => {
                    loading.value = false;
                    message.value = 'Vue.js加载成功!';
                });

                return {
                    loading,
                    message,
                    error
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
