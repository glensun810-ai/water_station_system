<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 会议室管理系统</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none !important; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <div class="max-w-md w-full mx-4">
            <!-- 登录卡片 -->
            <div class="bg-white rounded-2xl shadow-2xl p-8">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">管理员登录</h1>
                    <p class="text-gray-500 mt-2">会议室管理系统</p>
                </div>
                
                <!-- 登录表单 -->
                <form @submit.prevent="handleLogin" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                        <input v-model="loginForm.username" 
                               type="text" 
                               required
                               placeholder="请输入用户名"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                        <input v-model="loginForm.password" 
                               type="password" 
                               required
                               placeholder="请输入密码"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    
                    <!-- 错误提示 -->
                    <div v-if="errorMessage" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                        {{ errorMessage }}
                    </div>
                    
                    <button type="submit"
                            :disabled="loading"
                            :class="[
                                'w-full py-3 px-4 rounded-lg font-medium text-white transition',
                                loading 
                                    ? 'bg-gray-400 cursor-not-allowed' 
                                    : 'bg-blue-600 hover:bg-blue-700'
                            ]">
                        {{ loading ? '登录中...' : '登录' }}
                    </button>
                </form>
                
                <!-- 默认账号提示 -->
                <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                    <p class="text-sm text-blue-800 font-medium mb-2">默认管理员账号</p>
                    <p class="text-xs text-blue-600">用户名：admin</p>
                    <p class="text-xs text-blue-600">密码：admin123</p>
                    <p class="text-xs text-red-600 mt-2 font-medium">⚠️ 生产环境请立即修改默认密码</p>
                </div>
            </div>
            
            <!-- 返回主页 -->
            <div class="text-center mt-6">
                <a href="/portal/index.html" class="text-white hover:text-gray-200 transition">
                    ← 返回主页
                </a>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                // API配置
                const API_BASE = localStorage.getItem('API_BASE') || 
                    (window.location.hostname === 'localhost' ? 'http://localhost:8000/api' : 'https://jhw-ai.com/api');
                
                // 登录表单
                const loginForm = ref({
                    username: '',
                    password: ''
                });
                
                // 状态
                const loading = ref(false);
                const errorMessage = ref('');
                
                // 处理登录
                const handleLogin = async () => {
                    if (!loginForm.value.username || !loginForm.value.password) {
                        errorMessage.value = '请输入用户名和密码';
                        return;
                    }
                    
                    loading.value = true;
                    errorMessage.value = '';
                    
                    try {
                        // 使用统一登录接口
                        const API_BASE = window.location.origin;
                        const response = await fetch(`${API_BASE}/api/auth/login`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                name: loginForm.value.username,
                                password: loginForm.value.password
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            // 统一存储：token存储为'token'，用户信息存储为'userInfo'
                            localStorage.setItem('token', data.access_token);
                            localStorage.setItem('userInfo', JSON.stringify({
                                id: data.user_info.user_id,
                                name: data.user_info.username,
                                role: data.user_info.role_name,
                                department: data.user_info.email || ''
                            }));
                            
                            // 跳转到管理后台
                            window.location.href = 'admin.html';
                        } else {
                            errorMessage.value = data.detail || '登录失败，请检查用户名和密码';
                        }
                    } catch (error) {
                        console.error('登录失败:', error);
                        errorMessage.value = '网络错误，请稍后重试';
                    } finally {
                        loading.value = false;
                    }
                };
                
                return {
                    loginForm,
                    loading,
                    errorMessage,
                    handleLogin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
