[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[tool:coverage:run]
source = .
omit = 
    tests/*
    */migrations/*
    */__pycache__/*
    */site-packages/*

[tool:coverage:report]
precision = 2
show_missing = True